{% extends 'inventory/base.html' %}
{% block content %}

<div class="flex justify-center items-center min-h-[60vh]">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-100">
        <h2 class="text-3xl font-black text-gray-800 mb-8 text-center italic tracking-tighter">
            Login<span class="text-blue-700">AutoFlow</span>
        </h2>
        
        <form method="post" class="space-y-4">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" name="username" 
                class="mt-1 w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" name="password" 
                class="mt-1 w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <button type="submit" 
            class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg">
                LOGIN
            </button>

        </form>
    </div>
</div>
{% endblock %}
